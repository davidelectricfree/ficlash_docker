name: Build FlClash Docker Image

on:
  # 每周一 UTC 02:00 自动检查 FlClash 是否有新版本
  schedule:
    - cron: '0 2 * * 1'

  # Dockerfile 或 workflow 文件改动时触发
  push:
    branches: [ main, master ]
    paths:
      - 'Dockerfile'
      - '.github/workflows/docker-build.yml'

  # PR 时仅构建验证，不推送
  pull_request:
    branches: [ main, master ]
    paths:
      - 'Dockerfile'
      - '.github/workflows/docker-build.yml'

  # 支持手动触发
  workflow_dispatch:
    inputs:
      force_rebuild:
        description: '强制重建（即使版本未变化）'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'
      custom_tag:
        description: '自定义镜像标签（留空则使用版本号）'
        required: false
        default: ''

env:
  IMAGE_NAME: flclash
  REGISTRY: ghcr.io

jobs:
  # ── Job 1：检查 FlClash 是否有新版本 ──────────────────────
  check-version:
    runs-on: ubuntu-latest
    outputs:
      new_version: ${{ steps.compare.outputs.new_version }}
      should_build: ${{ steps.compare.outputs.should_build }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: 获取 FlClash 最新版本号
        id: latest
        run: |
          VERSION=$(curl -s https://api.github.com/repos/chen08209/FlClash/releases/latest \
            | jq -r '.tag_name')
          echo "latest_version=$VERSION" >> $GITHUB_OUTPUT
          echo "最新版本: $VERSION"

      - name: 读取上次构建的版本号
        id: last
        run: |
          if [ -f .last-built-version ]; then
            LAST=$(cat .last-built-version)
          else
            LAST="none"
          fi
          echo "last_version=$LAST" >> $GITHUB_OUTPUT
          echo "上次构建版本: $LAST"

      - name: 比较版本，决定是否构建
        id: compare
        run: |
          LATEST="${{ steps.latest.outputs.latest_version }}"
          LAST="${{ steps.last.outputs.last_version }}"
          FORCE="${{ github.event.inputs.force_rebuild }}"

          echo "new_version=$LATEST" >> $GITHUB_OUTPUT

          if [ "$LATEST" != "$LAST" ] || [ "$FORCE" = "true" ] || [ "${{ github.event_name }}" = "push" ] || [ "${{ github.event_name }}" = "pull_request" ] || [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "should_build=true" >> $GITHUB_OUTPUT
            echo "✅ 需要构建：latest=$LATEST, last=$LAST, force=$FORCE"
          else
            echo "should_build=false" >> $GITHUB_OUTPUT
            echo "⏭️ 版本未变化，跳过构建"
          fi

  # ── Job 2：构建并推送 Docker 镜像 ─────────────────────────
  build:
    runs-on: ubuntu-latest
    needs: check-version
    if: needs.check-version.outputs.should_build == 'true'

    permissions:
      contents: write   # 需要写权限以回写版本文件
      packages: write   # 推送到 GHCR

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 确定镜像标签
        id: tags
        run: |
          VERSION="${{ needs.check-version.outputs.new_version }}"
          CUSTOM_TAG="${{ github.event.inputs.custom_tag }}"
          IMAGE="${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}"

          if [ -n "$CUSTOM_TAG" ]; then
            # 手动指定了自定义标签
            TAGS="$IMAGE:$CUSTOM_TAG"
          else
            # 默认：版本号 + latest
            TAGS="$IMAGE:$VERSION,$IMAGE:latest"
          fi

          echo "tags=$TAGS" >> $GITHUB_OUTPUT
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "生成标签: $TAGS"

      - name: 构建并推送 Docker 镜像
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.tags.outputs.tags }}
          build-args: |
            FLCLASH_VERSION=${{ steps.tags.outputs.version }}
            DOCKER_IMAGE_VERSION=${{ steps.tags.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64

      - name: 回写版本号到仓库
        if: github.event_name != 'pull_request'
        run: |
          VERSION="${{ steps.tags.outputs.version }}"
          echo "$VERSION" > .last-built-version
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .last-built-version
          git diff --staged --quiet || git commit -m "chore: update built version to $VERSION [skip ci]"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: 输出构建摘要
        run: |
          echo "## ✅ 构建成功" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| 项目 | 内容 |" >> $GITHUB_STEP_SUMMARY
          echo "|------|------|" >> $GITHUB_STEP_SUMMARY
          echo "| FlClash 版本 | ${{ steps.tags.outputs.version }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 镜像标签 | ${{ steps.tags.outputs.tags }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 触发方式 | ${{ github.event_name }} |" >> $GITHUB_STEP_SUMMARY
